name: Image

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: image-build-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: juliomathis/portfolio

jobs:
  build-and-push:
    name: Build and publish portfolio image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PORTFOLIO_BOT_APP_ID }}
          private-key: ${{ secrets.PORTFOLIO_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir app install --frozen-lockfile

      - name: Build application
        run: pnpm --dir app build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: app
          file: app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump deployment image tag and update GitOps target
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          DEPLOYMENT_FILE="k8s/manifests/portfolio/deployment.yaml"
          BUMP_BRANCH="bot/deploy-image-${GITHUB_SHA}"

          sed -i "s|^\([[:space:]]*image:[[:space:]]*\)ghcr.io/juliomathis/portfolio:.*$|\\1${IMAGE_TAG}|" "${DEPLOYMENT_FILE}"

          git add "${DEPLOYMENT_FILE}"

          if git diff --cached --quiet; then
            echo "No-op rerun: deployment already points at ${IMAGE_TAG}."
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only --cached)"
          if [ "${CHANGED_FILES}" != "${DEPLOYMENT_FILE}" ]; then
            echo "Refusing push: staged files are not limited to deployment.yaml"
            git diff --name-only --cached
            exit 1
          fi

          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git commit -m "chore(deploy): bump portfolio image to ${GITHUB_SHA}"

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          set +e
          PUSH_OUTPUT="$(git push origin HEAD:main 2>&1)"
          PUSH_STATUS=$?
          set -e

          if [ "${PUSH_STATUS}" -eq 0 ]; then
            echo "${PUSH_OUTPUT}"
            echo "Pushed deployment bump directly to main."
            exit 0
          fi

          echo "${PUSH_OUTPUT}"

          case "${PUSH_OUTPUT}" in
            *"Changes must be made through a pull request."*)
              echo "Direct push blocked by branch protection; opening PR fallback."
              ;;
            *"fetch first"*|*"non-fast-forward"*|*"remote contains work that you do not have locally"*)
              echo "Main advanced during this workflow run; opening PR fallback from bot branch."
              ;;
            *)
              echo "Push to main failed for an unexpected reason."
              exit "${PUSH_STATUS}"
              ;;
          esac

          git push --force-with-lease origin HEAD:"${BUMP_BRANCH}"

          EXISTING_PR="$(gh pr list --state open --base main --head "${BUMP_BRANCH}" --json number --jq '.[0].number')"
          if [ -n "${EXISTING_PR}" ]; then
            echo "Deployment bump PR already open: #${EXISTING_PR}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${BUMP_BRANCH}" \
            --title "chore(deploy): bump portfolio image to ${GITHUB_SHA}" \
            --body "Automated deployment image bump after publishing \`${IMAGE_TAG}\`."
