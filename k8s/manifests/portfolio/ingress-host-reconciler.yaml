apiVersion: v1
kind: ServiceAccount
metadata:
  name: portfolio-ingress-host-reconciler
  namespace: portfolio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portfolio-ingress-host-reconciler
  namespace: portfolio
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - portfolio-ingress-config
    verbs:
      - get
      - patch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    resourceNames:
      - portfolio
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portfolio-ingress-host-reconciler
  namespace: portfolio
subjects:
  - kind: ServiceAccount
    name: portfolio-ingress-host-reconciler
    namespace: portfolio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portfolio-ingress-host-reconciler
---
apiVersion: batch/v1
kind: Job
metadata:
  name: portfolio-ingress-host-reconciler
  namespace: portfolio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: portfolio-ingress-host-reconciler
      restartPolicy: OnFailure
      containers:
        - name: reconcile-host
          image: bitnami/kubectl@sha256:98736aabcecb8d3cbcdcd7b132d14b1d67ed99bac2f06d471f06235933103df3
          command:
            - /bin/sh
            - -ceu
            - |
              NODE_IP=""
              for _ in $(seq 1 30); do
                NODE_IP="$(kubectl -n portfolio get ingress portfolio -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
                if [ -n "${NODE_IP}" ]; then
                  break
                fi
                sleep 2
              done
              if [ -z "${NODE_IP}" ]; then
                NODE_IP="$(kubectl -n portfolio get ingress portfolio -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
              fi
              NODE_IP="$(printf '%s' "${NODE_IP}" | tr ' ' '\n' | grep -E '^[0-9]+(\.[0-9]+){3}$' | head -n 1)"
              if [ -z "${NODE_IP}" ]; then
                echo "No IPv4 node address found" >&2
                exit 1
              fi
              DASHED_IP="$(printf '%s' "${NODE_IP}" | tr '.' '-')"
              HOST="portfolio.${DASHED_IP}.nip.io"

              kubectl -n portfolio patch configmap portfolio-ingress-config --type merge -p "{\"data\":{\"host\":\"${HOST}\"}}"

              kubectl -n portfolio patch ingress portfolio --type json -p "[{\"op\":\"replace\",\"path\":\"/spec/rules/0/host\",\"value\":\"${HOST}\"},{\"op\":\"replace\",\"path\":\"/spec/tls/0/hosts/0\",\"value\":\"${HOST}\"}]"
